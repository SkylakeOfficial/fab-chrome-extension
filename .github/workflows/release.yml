name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  validate:
    name: Validate manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check manifest.json is valid JSON and version matches tag
        run: |
          python3 -c "
          import json, os, sys
          with open('manifest.json') as f:
              m = json.load(f)
          # Required MV3 fields
          assert m.get('manifest_version') == 3, 'manifest_version must be 3'
          assert m.get('name'), 'name is required'
          assert m.get('version'), 'version is required'
          assert m.get('background', {}).get('service_worker'), 'service_worker is required'
          # Version matches tag
          tag = os.environ.get('GITHUB_REF_NAME', '').lstrip('v')
          if tag:
              assert m['version'] == tag, f'manifest version {m[\"version\"]} does not match tag {tag}'
          print(f'manifest.json valid: v{m[\"version\"]}')
          "

      - name: Check required files exist
        run: |
          for f in \
            background/service-worker.js \
            content/oauth-capture.js \
            lib/auth.js \
            lib/storage.js \
            lib/browser-manifest-parser.js \
            lib/debug.js \
            popup/popup.html popup/popup.js popup/popup.css \
            library/library.html library/library.js library/library.css \
            vendor/fab-download-browser.js \
            icons/icon16.png icons/icon48.png icons/icon128.png
          do
            test -f "$f" || { echo "MISSING: $f"; exit 1; }
          done
          echo "All required files present."

  package:
    name: Package extension
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Create zip artifact
        run: |
          zip -r fab-chrome-extension.zip . \
            -x '.git/*' \
            -x '.github/*' \
            -x 'SPECS.md' \
            -x 'README.md' \
            -x '.gitignore' \
            -x '.claude/*'

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: fab-chrome-extension
          path: fab-chrome-extension.zip
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: fab-chrome-extension

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          echo "## Changes since $PREV_TAG" > release_notes.md
          echo "" >> release_notes.md
          if [ -n "$PREV_TAG" ]; then
            git log "$PREV_TAG..HEAD" --oneline --no-merges >> release_notes.md
          else
            git log --oneline --no-merges >> release_notes.md
          fi
          echo "" >> release_notes.md
          echo "### Installation" >> release_notes.md
          echo "1. Download \`fab-chrome-extension.zip\` from this release" >> release_notes.md
          echo "2. Unzip to a folder" >> release_notes.md
          echo "3. Open \`chrome://extensions/\`, enable **Developer mode**" >> release_notes.md
          echo "4. Click **Load unpacked** and select the unzipped folder" >> release_notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: fab-chrome-extension.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Optional: Submit to Chrome Web Store.
  # Uncomment and configure the required secrets before enabling.
  #
  # Required secrets (set in repo Settings → Secrets and variables → Actions):
  #   CWS_EXTENSION_ID  — The 32-character extension ID from the Chrome Web Store dashboard
  #   CWS_CLIENT_ID     — OAuth 2.0 client ID from Google Cloud Console
  #   CWS_CLIENT_SECRET — OAuth 2.0 client secret from Google Cloud Console
  #   CWS_REFRESH_TOKEN — OAuth 2.0 refresh token (use `chrome-webstore-upload-cli` to obtain)
  #
